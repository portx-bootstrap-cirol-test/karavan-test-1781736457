openapi: 3.0.0
info:
  version: 1.0.0
  title: Simple Banking API
  description: A simple API for banking operations
servers:
  - url: http://localhost:8080/api/v1
paths:
  /accounts:
    post:
      summary: Create an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Account'
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Invalid request
  /accounts/{accountId}:
    get:
      summary: Retrieve an account by ID
      parameters:
        - name: accountId
          in: path
          required: true
          description: The ID of the account
          schema:
            type: string
      responses:
        '200':
          description: Account retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          description: Account not found
  /accounts/{accountId}/deposit:
    post:
      summary: Deposit into an account
      parameters:
        - name: accountId
          in: path
          required: true
          description: The ID of the account
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Transaction'
      responses:
        '200':
          description: Deposit successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Invalid request
  /accounts/{accountId}/withdraw:
    post:
      summary: Withdraw from an account
      parameters:
        - name: accountId
          in: path
          required: true
          description: The ID of the account
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Transaction'
      responses:
        '200':
          description: Withdraw successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Invalid request
components:
  schemas:
    Account:
      type: object
      properties:
        id:
          type: string
          description: The account ID
        balance:
          type: number
          description: The account balance
          format: float
    Transaction:
      type: object
      properties:
        amount:
          type: number
          description: The transaction amount
          format: float
