openapi: 3.0.0
info:
  version: 2.0.0
  title: Simple Banking API
  description: A simple API for banking operations. This is version 2.0 of the API, which includes a new endpoint for transferring funds between accounts.
servers:
  - url: http://localhost:8080/api/v1
    description: Version 1 of the API
  - url: http://localhost:8080/api/v2
    description: Version 2 of the API (includes the new transfer endpoint)
tags:
  - name: Accounts
    description: Operations related to account management
  - name: Transactions
    description: Operations related to money transactions
paths:
  /accounts:
    post:
      tags:
        - Accounts
      summary: Create an account
      description: Creates a new account with an initial balance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Account'
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /accounts/{accountId}:
    get:
      tags:
        - Accounts
      summary: Retrieve an account by ID
      description: Retrieves the details of an existing account.
      parameters:
        - name: accountId
          in: path
          required: true
          description: The ID of the account
          schema:
            type: string
      responses:
        '200':
          description: Account retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /accounts/{accountId}/deposit:
    post:
      tags:
        - Transactions
      summary: Deposit into an account
      description: Deposits a specified amount into an account.
      parameters:
        - name: accountId
          in: path
          required: true
          description: The ID of the account
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Transaction'
      responses:
        '200':
          description: Deposit successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /accounts/{accountId}/withdraw:
    post:
      tags:
        - Transactions
      summary: Withdraw from an account
      description: Withdraws a specified amount from an account.
      parameters:
        - name: accountId
          in: path
          required: true
          description: The ID of the account
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Transaction'
      responses:
        '200':
          description: Withdraw successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /accounts/{sourceAccountId}/transfer/{targetAccountId}:
    post:
      tags:
        - Transactions
      summary: Transfer funds between accounts
      description: Transfers a specified amount from one account to another.
      parameters:
        - name: sourceAccountId
          in: path
          required: true
          description: The ID of the source account
          schema:
            type: string
        - name: targetAccountId
          in: path
          required: true
          description: The ID of the target account
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Transaction'
      responses:
        '200':
          description: Transfer successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    Account:
      type: object
      properties:
        id:
          type: string
          description: The account ID
        balance:
          type: number
          description: The account balance
          format: float
    Transaction:
      type: object
      properties:
        amount:
          type: number
          description: The transaction amount
          format: float
    Error:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: The error code
        message:
          type: string
          description: The error message
